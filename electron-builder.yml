appId: com.mdpdf.app
productName: mdPDF

directories:
  output: release

files:
  - electron/dist/**/*
  - renderer/out/**/*
  - node_modules/github-markdown-css/**/*
  - node_modules/highlight.js/styles/github.css
  - package.json

win:
  target:
    - target: nsis
    - target: portable
  icon: build/icon.ico

mac:
  target: dmg
  category: public.app-category.productivity
  icon: build/icon.icns

linux:
  target: AppImage
  icon: build/icon.png

publish:
  provider: github
  owner: ibrahimokdadov
  repo: winmdPDF
