server {
    listen 5000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'none'; worker-src blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; object-src 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(gif|png|jpg|jpeg|svg|webp|woff2|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    location ~ /\. { deny all; return 404; }
    location ~* \.(env|conf|dockerfile|toml|lock|db)$ { deny all; return 404; }
}
