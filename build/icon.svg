<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <rect width="512" height="512" rx="96" ry="96" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.25"/>

  <!-- "md" italic serif text -->
  <text
    x="82"
    y="296"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-size="148"
    font-weight="400"
    fill="white"
    opacity="0.95"
    letter-spacing="-4"
  >md</text>

  <!-- Arrow -->
  <g filter="url(#glow)" opacity="0.95">
    <!-- Arrow shaft -->
    <line x1="294" y1="256" x2="370" y2="256" stroke="url(#arrowGrad)" stroke-width="14" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polyline points="348,228 378,256 348,284" fill="none" stroke="url(#arrowGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- PDF document icon -->
  <!-- Page body -->
  <rect x="388" y="158" width="88" height="108" rx="6" fill="white" opacity="0.12"/>
  <rect x="394" y="175" width="76" height="88" rx="4" fill="white" opacity="0.08"/>
  <!-- Folded corner -->
  <path d="M430 164 L472 164 L472 200 L430 200 Z" fill="none"/>
  <path d="M388 164 L430 164 L430 200 L448 218 L388 218 Z" fill="white" opacity="0.9"/>
  <path d="M430 164 L448 182 L448 218 L430 200 Z" fill="#6366f1" opacity="0.7"/>
  <path d="M430 164 L448 182 L430 182 Z" fill="white" opacity="0.4"/>
  <!-- "PDF" label lines -->
  <rect x="396" y="228" width="52" height="6" rx="3" fill="white" opacity="0.7"/>
  <rect x="396" y="242" width="36" height="6" rx="3" fill="#8b5cf6" opacity="0.9"/>
  <rect x="396" y="256" width="44" height="6" rx="3" fill="white" opacity="0.4"/>

  <!-- Bottom accent strip -->
  <rect x="96" y="420" width="320" height="4" rx="2" fill="url(#arrowGrad)" opacity="0.6"/>
</svg>
